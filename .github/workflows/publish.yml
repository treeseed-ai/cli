name: Publish @treeseed/cli

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment:
      name: Production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json', 'utf8')); if (p.scripts) delete p.scripts.prepare; fs.writeFileSync('package.json', JSON.stringify(p, null, '\t') + '\n');"
          npm ci
          git checkout -- package.json

      - name: Prepare SDK dependency
        run: |
          if test -f ./node_modules/@treeseed/sdk/package.json; then
            npm run build:dist --prefix ./node_modules/@treeseed/sdk
          fi

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:check-tag -- "${GITHUB_REF_NAME}"

      - name: Verify package
        run: npm run release:verify

      - name: Publish package
        run: npm run release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
