name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TREESEED_GITHUB_AUTOMATION_MODE: stub
      TREESEED_STAGE_WAIT_MODE: skip
      TREESEED_AGENT_DISABLE_GIT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json', 'utf8')); if (p.scripts) delete p.scripts.prepare; fs.writeFileSync('package.json', JSON.stringify(p, null, '\t') + '\n');"
          if test -f package-lock.json; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          git checkout -- package.json

      - name: Prepare SDK dependency
        run: |
          if test -f ./node_modules/@treeseed/sdk/package.json; then
            npm run build:dist --prefix ./node_modules/@treeseed/sdk
          fi

      - name: Verify package
        run: npm run verify:direct
