id: "@treeseed/cli"
name: TreeSeed CLI
kind: node-typescript
type: node-cli
repository: treeseed-ai/cli
publishTarget: npm
capabilities: { save: true, verify: true, publish: true, deploy: false, localOnly: false }
workflowTemplateVersion: "1"
githubEnvironments:
  - production
requiredSecrets:
  - NPM_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: npm
    name: "@treeseed/cli"
releaseGate:
  workflow: verify.yml
projectArchitecture:
  topology: single_repository_site
  rootPath: .
  sitePath: docs
  contentPath: docs/src/content
  contentRuntimeSource: r2_published_manifest
  localContentMaterialization: existing_path
  contentPublishTarget:
    kind: cloudflare_r2
    prefix: packages/cli
